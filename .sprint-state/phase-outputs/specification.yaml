# specification.yaml — Auto-generated from Delphi review consensus
# Sprint: sprint-2026-07-08-03
# Date: 2026-07-08
# Verdict: APPROVED (with 2 critical fixes noted)

feature:
  name: "字幕校对交互功能"
  description: >
    在 FunASR 转录完成后，提供终端交互界面让用户逐段检查和修改字幕文本。
    修改完成后覆盖 transcript.json 并重新生成 SRT。
  version: "1.0.0"

requirements:
  - id: REQ-01
    title: "CLI review 子命令"
    description: "新增 `python -m video_splitter review <video.mp4>` 子命令"
    acceptance:
      - "命令接受 video 参数和 --transcript/--resume/--no-save 可选参数"
      - "自动定位对应 .transcript.json 文件"
      - "无 transcript 文件时给出明确错误提示"

  - id: REQ-02
    title: "终端交互界面"
    description: "逐段显示字幕，用户可修改文本"
    acceptance:
      - "显示当前进度（N/total）、已修改数"
      - "显示每段时间码（HH:MM:SS.mmm → HH:MM:SS.mmm）"
      - "显示原文，接受用户输入"
      - "Enter 空输入 = 保留原文，:q 保存退出，:p 上一段，:h 帮助，:j N 跳转"

  - id: REQ-03
    title: "断点续传"
    description: "支持中断后从上次位置继续校对"
    acceptance:
      - "每段处理后写入 .review_progress.json"
      - "再次运行自动读取进度继续"
      - "进度文件损坏时提示用户并重新开始"

  - id: REQ-04
    title: "数据安全"
    description: "原子写入，防止数据损坏"
    acceptance:
      - "使用 tempfile + os.replace() 原子覆盖 transcript.json"
      - "用户输入过滤控制字符和 null bytes"
      - "所有文件操作使用 encoding='utf-8'"

  - id: REQ-05
    title: "SRT 重生"
    description: "校对完成后重新生成 .zh.srt"
    acceptance:
      - "调用 to_srt() 重新生成 SRT 文件"

  - id: REQ-06
    title: "空段过滤"
    description: "加载时自动过滤空白和零长度段落"
    acceptance:
      - "text.strip() == '' 的段落自动跳过"
      - "start == end 的段落自动跳过"

files:
  new:
    - "video_splitter/review.py"
    - "video_splitter/tests/test_review.py"
  modified:
    - "video_splitter/cli.py"
  unchanged:
    - "video_splitter/pipeline.py"
    - "video_splitter/extractor/transcribe.py"
    - "video_splitter/extractor/audio.py"
    - "video_splitter/config.py"

edge_cases:
  - "空 transcript（0 segments）"
  - "单段 transcript"
  - "非常长的单段文本（终端换行）"
  - "损坏的 transcript.json"
  - "进度文件 JSON 解析失败"
  - "零编辑完成（无任何修改）"
  - ":p 在第一段时"
  - ":j N 越界"
  - "Ctrl+C 中断"
