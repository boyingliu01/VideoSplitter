specification:
  requirements:
    - id: REQ-001
      description: SplitController — 章节列表状态管理（中心数据源），Qt信号驱动，update_chapter/revalidate/export
      priority: critical
    - id: REQ-002
      description: ChapterListWidget — 可编辑章节列表（QTableWidget），支持标题编辑/时间微调
      priority: critical
    - id: REQ-003
      description: TimelineWidget — 自绘时间轴，显示章节分割线，支持拖拽调整边界（hitTest ±6px, 最小5秒）
      priority: high
    - id: REQ-004
      description: SplitPanel — Split tab 主面板，组合章节列表+时间轴+检测/验证/拆分/取消按钮
      priority: critical
    - id: REQ-005
      description: SplitWorker — 后台FFmpeg切割worker（QObject+moveToThread），段间cancel()
      priority: critical
    - id: REQ-006
      description: DetectChaptersWorker — 后台LLM章节检测worker（QObject+moveToThread），由MainWindow管理生命周期
      priority: critical
    - id: REQ-007
      description: app.py 集成 — 替换Split占位tab，持久化video_path，管理Worker生命周期，Review→Split数据流
      priority: critical
    - id: REQ-008
      description: ReviewController 增强 — 存储duration，新增 get_transcript() 返回含 duration+segments 的完整 dict
      priority: critical
    - id: REQ-009
      description: 测试覆盖 — SplitController + Split widgets + Workers 共30+测试
      priority: high
    - id: REQ-010
      description: architecture.yaml 更新 — 添加gui层约束
      priority: medium

  acceptance_criteria:
    - id: AC-001
      requirement: REQ-001
      criteria: SplitController 接收 DetectChaptersWorker 的 chapters_detected 信号并存储章节列表
      test_type: unit
    - id: AC-002
      requirement: REQ-001
      criteria: update_chapter 边界检查正确（start<end, end-start>=5s, 不越界）
      test_type: unit
    - id: AC-003
      requirement: REQ-001
      criteria: SplitController 为中心数据源，Widget 通过 blockSignals(True) 在 set_chapters 时防循环
      test_type: unit
    - id: AC-004
      requirement: REQ-002
      criteria: ChapterListWidget 渲染章节列表，双击编辑标题 emit chapter_edited 信号
      test_type: unit
    - id: AC-005
      requirement: REQ-003
      criteria: TimelineWidget 绘制章节分割线，拖拽 emit boundary_moved，最小5秒约束
      test_type: unit
    - id: AC-006
      requirement: REQ-004
      criteria: SplitPanel 含检测/验证/拆分/取消按钮，章节列表，时间轴
      test_type: unit
    - id: AC-007
      requirement: REQ-005
      criteria: SplitWorker 后台切割，emit progress/finished/error，段间 cancel 中断
      test_type: unit
    - id: AC-008
      requirement: REQ-006
      criteria: DetectChaptersWorker 由 MainWindow 创建+管理QThread，emit chapters_detected/error
      test_type: unit
    - id: AC-009
      requirement: REQ-007
      criteria: Split tab 启用，video_path 持久化，Worker QThread 生命周期管理正确
      test_type: integration
    - id: AC-010
      requirement: REQ-008
      criteria: ReviewController.get_transcript() 返回 {"duration": float, "segments": list}，含修正内容
      test_type: unit
    - id: AC-011
      requirement: REQ-009
      criteria: 新增测试30+，全量测试通过，覆盖率>=75%
      test_type: unit
    - id: AC-012
      requirement: REQ-005
      criteria: SplitWorker 通过 progress_callback=lambda 桥接 VideoCutter 进度到 Qt Signal
      test_type: unit
    - id: AC-013
      requirement: REQ-001
      criteria: revalidate() 调用 ChapterValidator 重新对齐+合并过短章节
      test_type: unit

  design_decisions:
    - id: DD-001
      decision: LLM 检测通过 DetectChaptersWorker 在后台执行，FFmpeg 切割通过 SplitWorker 在后台执行
      rationale: 避免阻塞主线程导致 UI 卡顿（LLM 调用可达 10-60 秒，FFmpeg 切割可达数分钟）
      alternatives_considered: 直接在 SplitController 中同步调用（会阻塞 UI）
    - id: DD-002
      decision: SplitController 为中心数据源，Widget 编辑通过 Signal→Controller→broadcast 模式同步，blockSignals防循环
      rationale: 防止 ChapterList↔Timeline 双向 Signal 循环
      alternatives_considered: Widget 之间直接信号连接（容易死循环）
    - id: DD-003
      decision: TimelineWidget 使用 QWidget 自绘（paintEvent），hitTest ±6px 判定拖拽目标，最小章节5秒
      rationale: 减少依赖，控制拖拽交互细节，防止过短章节
      alternatives_considered: pyqtgraph（过重）
    - id: DD-004
      decision: ReviewController 存储 duration + segments，get_transcript() 暴露内存中修正版完整 transcript
      rationale: SplitController 需要修正后的字幕+duration 进行章节检测
      alternatives_considered: 从磁盘读取（会丢失 GUI 中未保存的修正）
    - id: DD-005
      decision: MainWindow 持久化 _current_video_path，管理所有 Worker 的 QThread 生命周期
      rationale: 与 TranscribeWorker 一致的模式，video_path 是 Split 和 Output 的必要输入
      alternatives_considered: Worker 自行管理线程（违反项目约定）
    - id: DD-006
      decision: Worker 支持 cancel()，段间检查 _cancelled 标志；FFmpeg 执行中不可取消（文档化限制）
      rationale: 长视频切割可能耗时数分钟，用户需要取消能力；即时取消需 Popen+terminate 增加复杂度
      alternatives_considered: Popen+terminate 即时取消（复杂度高，收益有限）
    - id: DD-007
      decision: "自动验证"按钮触发 SplitController.revalidate()，重新调用 ChapterValidator 对齐+合并
      rationale: 用户手动编辑后可能需要重新对齐边界
      alternatives_considered: 仅依赖 LLM 检测（不够灵活）
